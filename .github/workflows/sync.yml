name: Moodle course → Markdown

on:
  workflow_dispatch:
    inputs:
      course_id:
        description: "Moodle course id (from the course URL, e.g. ?id=3261)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Sync course
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          MOODLE_BASE_URL: ${{ secrets.MOODLE_BASE_URL }}
          COURSE_ID: ${{ inputs.course_id }}
        run: python main.py --course-id "$COURSE_ID"

      - uses: actions/upload-artifact@v4
        with:
          name: moodle-md-${{ inputs.course_id }}
          path: output/*.md
          retention-days: 7
